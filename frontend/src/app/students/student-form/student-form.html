<section class="student-form-page">
    <header class="student-form-header">
        <h1>{{ title() }}</h1>
        <a mat-stroked-button routerLink="/students">
            <mat-icon>arrow_back</mat-icon>
            Back to Directory
        </a>
    </header>

    @if (initializing()) {
    <div class="state-box">
        <p>Loading student details...</p>
    </div>
    } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="student-form">
        <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Major</mat-label>
            <input matInput formControlName="major" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Year</mat-label>
            <input matInput type="number" formControlName="year" min="1" max="8" />
        </mat-form-field>

        @if (error()) {
        <p class="error-text">{{ error() }}</p>
        }

        <div class="actions">
            <button mat-stroked-button type="button" routerLink="/students" [disabled]="loading()">Cancel</button>
            <button mat-flat-button type="submit" [disabled]="loading()">
                {{ loading() ? 'Saving...' : 'Save Student' }}
            </button>
        </div>
    </form>
    }
</section>
